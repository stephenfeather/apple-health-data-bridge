  - design_already_approved: "The eval harness design pre-existed and was approved; brainstorming reduced to resolving §13 open items. Implementation plan was authored fresh against scout-verified signatures (not reasoning blind)."
  - reviewer_gated_ephemeral_tdd: "Used the repo's proven flow over a native pane team: lead dispatches each task to kraken (implements+tests, leaves unstaged, NO git), lead independently runs swift test, lead commits via github-agent-commit. Batched the low-risk pure-core tasks (6–9, 10–11) into single kraken dispatches to cut overhead while keeping per-task atomic commits."
  - entry_point_stub_then_replace: "SwiftPM only treats a SINGLE-file executable as an implicit script; the multi-file bridge-eval failed to link (`_bridge_eval_main` undefined) from Task 2 on. Added a temporary @main BridgeEvalEntry (commit ee048e4) to unblock linking for Tasks 2–12, then Task 13 REPLACED it with the real ArgumentParser root (only one @main allowed). Plan defect: it deferred @main to Task 13 — the entry point belonged in the Task-1 scaffold."
  - score_determinism_diverged_from_bot: "Gemini's fix for non-deterministic `score` (`ISO8601DateFormatter().date(from: manifest.timestamp)`) was itself buggy — manifest.timestamp is filesystem-sanitized (colons→dashes) for the dir name and won't parse. Diverged: added a separate unsanitized Manifest.referenceDateISO set from the same run instant; score parses that for `now`."

