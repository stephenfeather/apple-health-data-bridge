decisions:
  - subject_id_content_based_hash: ObservationID derives from subjectId+code+date+value+unit (NOT source-file key) — the id IS the iOS HKMetadataKeySyncIdentifier, must be stable forever; reversed an earlier per-file decision after review.
  - subject_identity: UUID subjectId + sha256(name|dob) cross-check; per-subject storage at ~/Documents/apple-health-data-bridge/subjects/<uuid>/; dual safety gate (CLI Patient cross-check now, iOS device-binding later).
  - config_toml_layered: TOML config, default ~/.config/apple-health-data-bridge/config.toml, --config overridable; precedence CLI flag > config > default; every scalar setting has a --flag; roster CLI-managed (subject add/list).
  - git_via_agent_helpers_only: never raw git for commits/sync — agent-gh contents PUT for main docs, github-agent-commit for feature branches (refuses main). Already in Claude Memory.
  - milestone_split: M1=FHIR JSON, M2=C-CDA, M3=PDF/LLM, iOS writer last. M1 deliberately can't process the user's real (C-CDA/PDF) data until M2 — accepted.

findings:
  - fhirmodels_0_9_3_api: Observation.code non-optional CodeableConcept; value/effective are optional enums (guard-let then switch, EffectiveX has .timing); Decimal has no .doubleValue (NSDecimalNumber); asNSDate() throws on the unwrapped DateTime/Instant; product is ModelsR4.
  - bp_is_component_panel: R4 blood pressure is a panel (LOINC 85354-9) with component systolic(8480-6)/diastolic(8462-4) and NO top-level value — parser must yield one Observation per component or BP never maps.
  - utc_date_determinism: asNSDate() on date-only FHIR values uses TimeZone.current → non-deterministic ids across machines; must build Date under a fixed UTC calendar.
  - phi_in_public_repo: real family identities (Caleb/Stephen Feather, DOBs) had leaked into plan/spec fixtures; filename-only PHI checks miss names inside committed .json fixtures.

